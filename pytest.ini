[pytest]
markers =
    layer1: Layer 1 — adversarial test cases
    layer2: Layer 2 — RAG quality evaluation
    layer3: Layer 3 — router accuracy tests
    layer4: Layer 4 — API integration tests
    layer5: Layer 5 — Playwright E2E tests
    slow: slow-running tests (excluded from pre-merge runs)
    requires_corpus: test requires documents to be uploaded and indexed

asyncio_mode = auto

addopts =
    -v
    --tb=short
    --strict-markers
